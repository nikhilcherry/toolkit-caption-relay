<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CaptionRelay — Sender</title>
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0;
    min-height: 100vh;
    background: #0b0f14;
    color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex;
    justify-content: center;
    padding: 32px 16px;
    box-sizing: border-box;
  }
  main { width: 100%; max-width: 480px; }
  h1 { font-size: 1.25rem; margin-bottom: 4px; }
  p.sub { color: #8b949e; margin-top: 0; font-size: 0.9rem; }
  .row { display: flex; gap: 8px; margin-bottom: 12px; }
  input, button {
    font-size: 1rem;
    border-radius: 8px;
    border: 1px solid #30363d;
    background: #161b22;
    color: #e6edf3;
    padding: 10px 12px;
  }
  input { flex: 1; }
  button {
    cursor: pointer;
    background: #238636;
    border-color: #2ea043;
    color: white;
    font-weight: 600;
  }
  button:hover { background: #2ea043; }
  button.secondary { background: #21262d; border-color: #30363d; }
  button.secondary:hover { background: #30363d; }
  button.active { background: #9e6a03; border-color: #d29922; }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.85rem;
    padding: 4px 10px;
    border-radius: 999px;
    background: #161b22;
    border: 1px solid #30363d;
    margin-bottom: 16px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #f85149; }
  .pill.open .dot { background: #3fb950; }
  .pill.connecting .dot { background: #d29922; }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; margin-top: 24px; }
  #log {
    margin-top: 20px;
    height: 160px;
    overflow-y: auto;
    background: #010409;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 8px 10px;
    font-family: ui-monospace, monospace;
    font-size: 0.8rem;
    color: #8b949e;
  }
  #log div { white-space: pre-wrap; }
</style>
</head>
<body>
<main>
  <h1>CaptionRelay — Sender</h1>
  <p class="sub">Laptop side. Connects and pushes caption events to every other client in the room.</p>

  <div class="row">
    <input id="url" type="text" value="ws://localhost:8787" />
  </div>
  <div class="row">
    <input id="room" type="text" placeholder="room (optional, default = &quot;default&quot;)" value="captions" />
    <button id="connectBtn" class="secondary">Reconnect</button>
  </div>

  <div id="statusPill" class="pill connecting"><span class="dot"></span><span id="statusText">connecting…</span></div>

  <div class="row">
    <input id="text" type="text" placeholder="Caption text…" />
    <button id="sendBtn">Send</button>
  </div>

  <div class="toggle-row">
    <span>Send a test caption every 2s</span>
    <button id="autoBtn" class="secondary">Off</button>
  </div>

  <div id="log"></div>
</main>

<script type="module">
  import { RelayClient } from '../relay-client.js';

  const urlInput = document.getElementById('url');
  const roomInput = document.getElementById('room');
  const connectBtn = document.getElementById('connectBtn');
  const statusPill = document.getElementById('statusPill');
  const statusText = document.getElementById('statusText');
  const textInput = document.getElementById('text');
  const sendBtn = document.getElementById('sendBtn');
  const autoBtn = document.getElementById('autoBtn');
  const log = document.getElementById('log');

  const COLORS = ['#38bdf8', '#f472b6', '#facc15', '#4ade80', '#a78bfa'];
  const SPEAKERS = ['Speaker 1', 'Speaker 2', 'Narrator'];
  const SAMPLE_LINES = [
    'This is a live captioning test.',
    'The quick brown fox jumps over the lazy dog.',
    'CaptionRelay keeps demos alive on flaky networks.',
    'Second screen, controller, or smart-glasses stand-in.',
  ];

  let relay = null;
  let autoTimer = null;

  function logLine(msg) {
    const div = document.createElement('div');
    div.textContent = `${new Date().toLocaleTimeString()}  ${msg}`;
    log.prepend(div);
  }

  function setStatus(status) {
    statusPill.className = `pill ${status}`;
    statusText.textContent = status === 'open' ? 'connected' : status;
  }

  function connect() {
    if (relay) relay.close();
    const room = roomInput.value.trim();
    relay = new RelayClient(urlInput.value.trim(), { room, reconnectMs: 1500, maxQueue: 50 });
    setStatus(relay.status);
    relay.on('open', () => { setStatus('open'); logLine('connected'); });
    relay.on('close', () => { setStatus('closed'); logLine('disconnected — will retry'); });
    relay.on('message', (obj) => logLine(`received (unexpected on sender): ${JSON.stringify(obj)}`));
  }

  function sendCaption(text) {
    if (!relay) return;
    const who = SPEAKERS[Math.floor(Math.random() * SPEAKERS.length)];
    const color = COLORS[Math.floor(Math.random() * COLORS.length)];
    const payload = { who, color, text };
    relay.send(payload);
    logLine(`sent: [${who}] ${text}`);
  }

  connectBtn.addEventListener('click', connect);

  sendBtn.addEventListener('click', () => {
    const text = textInput.value.trim();
    if (!text) return;
    sendCaption(text);
    textInput.value = '';
  });

  textInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendBtn.click();
  });

  autoBtn.addEventListener('click', () => {
    if (autoTimer) {
      clearInterval(autoTimer);
      autoTimer = null;
      autoBtn.textContent = 'Off';
      autoBtn.classList.remove('active');
      return;
    }
    autoBtn.textContent = 'On';
    autoBtn.classList.add('active');
    autoTimer = setInterval(() => {
      const text = SAMPLE_LINES[Math.floor(Math.random() * SAMPLE_LINES.length)];
      sendCaption(text);
    }, 2000);
  });

  connect();
</script>
</body>
</html>
